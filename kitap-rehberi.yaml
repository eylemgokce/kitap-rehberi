openapi: 3.0.3
info:
  title: Kitap Rehberi API
  version: 1.0.0
  description: >
    Bu API, "Kitap Rehberi" uygulaması için tasarlanmış bir RESTful servistir. 
    Kullanıcıların kayıt/giriş yapmasını, kitap ekleme/güncelleme/silme işlemlerini, 
    kitaplara yorum yapılmasını ve kitapların favorilere eklenmesini sağlar.
    API, JWT tabanlı kimlik doğrulama ile korunmaktadır.
  contact:
    name: Kitap Rehberi Geliştiricisi
    email: iletisim@kitaprehberi.com

servers:
  - url: https://api.kitaprehberi.com
    description: Üretim sunucusu (Production)
  - url: http://localhost:3000
    description: Yerel geliştirme sunucusu (Development)

tags:
  - name: Auth
    description: Kullanıcı kayıt ve giriş işlemleri
  - name: Kitaplar
    description: Kitap arama, detay görüntüleme, güncelleme ve silme işlemleri
  - name: Kullanıcılar
    description: Profil güncelleme ve favori kitap işlemleri
  - name: Yorumlar
    description: Kitaplara yorum ekleme ve silme işlemleri

security:
  - BearerAuth: []

paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: Giriş Yapma
      operationId: loginUser
      security: [] # Bu endpoint token gerektirmez
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Başarılı giriş. Token döner.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: E-posta veya şifre hatalı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/register:
    post:
      tags:
        - Auth
      summary: Üye Olma
      operationId: registerUser
      security: [] # Bu endpoint token gerektirmez
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Kullanıcı başarıyla oluşturuldu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Geçersiz veya eksik bilgi (örn. e-posta zaten kullanımda)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /books/search:
    get:
      tags:
        - Kitaplar
      summary: Kitap Arama
      operationId: searchBooks
      security: []
      parameters:
        - name: q
          in: query
          required: true
          description: Kitap adı veya yazara göre arama kelimesi
          schema:
            type: string
          example: "Suç ve Ceza"
      responses:
        "200":
          description: Arama sonuçları listelendi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"

  /books/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Kitabın benzersiz kimlik numarası
        schema:
          type: string
        example: "book123"

    get:
      tags:
        - Kitaplar
      summary: Kitap Detay Görüntüleme
      operationId: getBook
      security: []
      responses:
        "200":
          description: Kitap detayları başarıyla getirildi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Kitap bulunamadı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    put:
      tags:
        - Kitaplar
      summary: Kitap Güncelleme
      operationId: updateBook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
      responses:
        "200":
          description: Kitap başarıyla güncellendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "401":
          description: Kimlik doğrulama başarısız
        "403":
          description: Bu işlem için yetkiniz bulunmuyor (Örn. Admin değilsiniz)
        "404":
          description: Kitap bulunamadı

    delete:
      tags:
        - Kitaplar
      summary: Kitap Silme
      operationId: deleteBook
      responses:
        "204":
          description: Kitap başarıyla silindi
        "401":
          description: Kimlik doğrulama başarısız
        "403":
          description: Yetkisiz işlem
        "404":
          description: Kitap bulunamadı

  /books/{id}/comments:
    post:
      tags:
        - Yorumlar
      summary: Kitap Yorum Ekleme
      operationId: addBookComment
      parameters:
        - name: id
          in: path
          required: true
          description: Yorum yapılacak kitabın kimlik numarası
          schema:
            type: string
          example: "book123"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Yorum başarıyla eklendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "401":
          description: Kimlik doğrulama başarısız
        "404":
          description: Kitap bulunamadı

  /users/{id}:
    put:
      tags:
        - Kullanıcılar
      summary: Profil Güncelleme
      operationId: updateUserProfile
      parameters:
        - name: id
          in: path
          required: true
          description: Kullanıcının benzersiz kimlik numarası
          schema:
            type: string
          example: "user789"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileInput"
      responses:
        "200":
          description: Profil başarıyla güncellendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Kimlik doğrulama başarısız
        "403":
          description: Kendi profiliniz dışında bir profili güncelleyemezsiniz

  /users/{id}/favorites/{bookId}:
    post:
      tags:
        - Kullanıcılar
      summary: Favorilere Kitap Ekleme
      operationId: addFavoriteBook
      parameters:
        - name: id
          in: path
          required: true
          description: Kullanıcının benzersiz kimlik numarası
          schema:
            type: string
          example: "user789"
        - name: bookId
          in: path
          required: true
          description: Favorilere eklenecek kitabın kimlik numarası
          schema:
            type: string
          example: "book123"
      responses:
        "200":
          description: Kitap favorilere başarıyla eklendi
        "401":
          description: Kimlik doğrulama başarısız
        "404":
          description: Kullanıcı veya Kitap bulunamadı

  /comments/{commentId}:
    delete:
      tags:
        - Yorumlar
      summary: Yorum Silme
      operationId: deleteComment
      parameters:
        - name: commentId
          in: path
          required: true
          description: Silinecek yorumun benzersiz kimlik numarası
          schema:
            type: string
          example: "cmt456"
      responses:
        "204":
          description: Yorum başarıyla silindi
        "401":
          description: Kimlik doğrulama başarısız
        "403":
          description: Sadece kendi yorumunuzu silebilirsiniz
        "404":
          description: Yorum bulunamadı

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'JWT tabanlı kimlik doğrulama. İstek başlığına "Authorization: Bearer <token>" eklenmeli.'

  schemas:
    LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "ornek@email.com"
        password:
          type: string
          format: password
          example: "123456"

    RegisterInput:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          example: "Ahmet Yılmaz"
        email:
          type: string
          format: email
          example: "ornek@email.com"
        password:
          type: string
          format: password
          example: "123456"

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5..."
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      properties:
        _id:
          type: string
          example: "user789"
        name:
          type: string
          example: "Ahmet Yılmaz"
        email:
          type: string
          format: email
          example: "ornek@email.com"
        bio:
          type: string
          example: "Bilim kurgu okuru."

    UserProfileInput:
      type: object
      properties:
        name:
          type: string
          example: "Ahmet Yılmaz"
        bio:
          type: string
          example: "Bilim kurgu okuru."

    Book:
      type: object
      properties:
        _id:
          type: string
          example: "book123"
        title:
          type: string
          example: "1984"
        author:
          type: string
          example: "George Orwell"
        description:
          type: string
          example: "Distopik bir roman."
        publishedYear:
          type: integer
          example: 1949

    BookInput:
      type: object
      required:
        - title
        - author
      properties:
        title:
          type: string
          example: "1984"
        author:
          type: string
          example: "George Orwell"
        description:
          type: string
          example: "Distopik bir roman."
        publishedYear:
          type: integer
          example: 1949

    Comment:
      type: object
      properties:
        _id:
          type: string
          example: "cmt456"
        userId:
          type: string
          example: "user789"
        text:
          type: string
          example: "Çok etkileyici bir kitap."
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5
        createdOn:
          type: string
          format: date-time
          example: "2026-03-06T14:30:00Z"

    CommentInput:
      type: object
      required:
        - text
        - rating
      properties:
        text:
          type: string
          example: "Çok etkileyici bir kitap."
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5

    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: "Bir hata oluştu"

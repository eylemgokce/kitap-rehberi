version: "3.8"

services:
  backend-api:
    build: ./kitap-rehberi-api
    container_name: kitap_backend
    ports:
      - "5000:5000"
    # Eğer backend'de .env dosyan varsa Docker'ın da okuması için:
    env_file:
      - ./kitap-rehberi-api/.env

  frontend-web:
    build: ./frontend
    container_name: kitap_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend-api
